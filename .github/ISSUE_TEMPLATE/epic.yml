name: Epic
description: High-level implementation objective within the v0.1 release
title: "[Epic] "
labels:
  - "kind:epic"
body:
  - type: markdown
    attributes:
      value: |
        Assign the `v0.1` milestone after issue creation.

  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: What is to be done?
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Objective criteria required to close this epic.
      placeholder: |
        - [ ] AC1 ...
        - [ ] AC2 ...
    validations:
      required: false
