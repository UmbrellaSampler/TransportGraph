name: Task
description: Implementable work item under one epic
title: "[Task] "
labels:
  - "kind:task"
body:
  - type: input
    id: parent_epic
    attributes:
      label: Parent epic issue
      description: Provide epic reference like #12.
      placeholder: "#<epic-issue-number>"
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Keep tasks around 0.5-2 days where possible.
      options:
        - XS
        - S
        - M
        - L
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Clear and testable implementation goal.
      placeholder: |
        Example:
        Define schema v0 for Node, Link, Area, Layer, and Connector entities,
        including required fields and identity constraints.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] AC1 ...
        - [ ] AC2 ...
    validations:
      required: true

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation notes
      description: Constraints, sequencing, and technical notes.
      placeholder: |
        - Constraints:
        - Dependencies:
        - Risks:
        - Non-goals:
    validations:
      required: false

  - type: textarea
    id: subtask_plan
    attributes:
      label: Sub-task plan
      description: Use sub-issues for independently tracked sub-work.
      placeholder: |
        - [ ] Sub-task A
        - [ ] Sub-task B
    validations:
      required: false
