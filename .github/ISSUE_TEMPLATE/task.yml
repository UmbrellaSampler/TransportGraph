name: Task
description: Implementable work item under one epic
title: "[Task] "
labels:
  - "kind:task"
body:
  - type: markdown
    attributes:
      value: |
        Phase is tracked via Milestone and Project `Phase` field, not via labels.
        Link this issue to its parent epic using GitHub's native issue hierarchy in the right sidebar after creation.

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      description: Select exactly one phase; set matching milestone and Project Phase field after issue creation.
      options:
        - "Phase-1 (Data Model and Format)"
        - "Phase-2 (Editor Core)"
        - "Phase-3 (Terrain Authoring)"
        - "Phase-4 (Multimodal and Validation)"
        - "Phase-5 (UX and Query API)"
        - "Phase-6 (Quality Demo Release)"
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Keep tasks around 0.5-2 days where possible.
      options:
        - XS
        - S
        - M
        - L
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Clear and testable implementation goal.
      placeholder: |
        Example:
        Define schema v0 for Node, Link, Area, Layer, and Connector entities,
        including required fields and identity constraints.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] AC1 ...
        - [ ] AC2 ...
    validations:
      required: true

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation notes
      description: Constraints, sequencing, and technical notes.
      placeholder: |
        - Constraints:
        - Dependencies:
        - Risks:
        - Non-goals:
    validations:
      required: false

  - type: textarea
    id: subtask_plan
    attributes:
      label: Sub-task plan
      description: Use sub-issues for independently tracked sub-work.
      placeholder: |
        - [ ] Sub-task A
        - [ ] Sub-task B
    validations:
      required: false
