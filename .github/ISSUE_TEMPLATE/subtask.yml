name: Sub-task
description: Small tracked unit under a task
title: "[Sub-task] "
labels:
  - "kind:subtask"
body:
  - type: markdown
    attributes:
      value: |
        Phase is tracked via Milestone and Project `Phase` field, not via labels.

  - type: input
    id: parent_task
    attributes:
      label: Parent task issue
      description: Provide task reference like #34.
      placeholder: "#<task-issue-number>"
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      description: Select exactly one phase; set matching milestone and Project Phase field after issue creation.
      options:
        - "Phase-1 (Data Model and Format)"
        - "Phase-2 (Editor Core)"
        - "Phase-3 (Terrain Authoring)"
        - "Phase-4 (Multimodal and Validation)"
        - "Phase-5 (UX and Query API)"
        - "Phase-6 (Quality Demo Release)"
    validations:
      required: true

  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
      description: Specific output expected from this sub-task.
      placeholder: |
        Example:
        Add deterministic ordering rules for all top-level collections
        and document normalization requirements.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] AC1 ...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies or blockers
      description: Optional references to related issues.
      placeholder: |
        - Depends on #...
        - Blocked by #...
    validations:
      required: false
