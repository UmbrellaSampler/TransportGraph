name: "Commit Message Check"

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    types: [opened, edited, reopened, synchronize]
    # Optional: restricts PR checks to only these base branches
    branches:
      - main
      - "release/**"

jobs:
  check-message:
    runs-on: ubuntu-latest
    steps:
      - name: Check Commit Message
        uses: GsActions/commit-message-checker@v2
        with:
          pattern: "Issue: #[0-9]+"
          error: 'Your commit message must include a reference like "Issue: #2".'
          checkAllCommitMessages: "true"
          accessToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for Commit Type
        uses: GsActions/commit-message-checker@v2
        with:
          # Matches "feat: " or scoped forms like "chore(pm): " at the start
          pattern: "^(feat|fix|refac|docs|chore|test)(\\([a-z0-9._/-]+\\))?: "
          error: 'Your commit message must start with an allowed type like "feat: " or a scoped form like "chore(pm): ".'
          checkAllCommitMessages: "true"
          accessToken: ${{ secrets.GITHUB_TOKEN }}
