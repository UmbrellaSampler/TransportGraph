name: "Commit Message Check"

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    types: [opened, edited, reopened, synchronize]
    # Optional: restricts PR checks to only these base branches
    branches:
      - main
      - "release/**"

jobs:
  check-message:
    runs-on: ubuntu-latest
    steps:
      - name: Check Commit Message
        uses: GsActions/commit-message-checker@v2
        with:
          pattern: "Issue: #[0-9]+"
          error: 'Your commit message must include a reference like "Issue: #2".'
          checkAllCommitMessages: "true"
          accessToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for Commit Type
        uses: GsActions/commit-message-checker@v2
        with:
          # Matches "feat: ", "fix: ", "refac: ", or "doc: " at the start
          pattern: "^(feat|fix|refac|doc): "
          error: 'Your commit message must start with "feat: ", "fix: ", "refac: ", or "doc: ".'
          checkAllCommitMessages: "true"
          accessToken: ${{ secrets.GITHUB_TOKEN }}
